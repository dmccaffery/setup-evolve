# Release pipeline — release-please watches main and keeps a release PR
# current from the Conventional Commit history; when that PR merges it cuts
# the GitHub release and vX.Y.Z tag. The publish job then re-validates the
# released commit (the committed dist/ must reproduce from src/) and moves
# the floating major tag (v1, v2, ...) consumers reference.
name: Release

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      # create github release and associated tag
      contents: write
      # create release pull request labels through the issues api
      issues: write
      # create the release pull request
      pull-requests: write
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
      sha: ${{ steps.release-please.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release-please
        with:
          release-type: node

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      # move the floating major tag
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci
      - run: npm run all
      - name: Verify released dist/ reproduces from src/
        run: git diff --exit-code -- dist

      - name: Move floating major tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          SHA: ${{ needs.release-please.outputs.sha }}
        run: |
          set -eu
          MAJOR="${TAG%%.*}"
          gh api "repos/$GITHUB_REPOSITORY/git/refs/tags/$MAJOR" -X PATCH -f sha="$SHA" -F force=true ||
          gh api "repos/$GITHUB_REPOSITORY/git/refs" -f ref="refs/tags/$MAJOR" -f sha="$SHA"
