# Thin caller: the release pipeline lives in the shared reusable workflow.
# Release-please watches main and keeps a release PR current from the
# Conventional Commit history; when that PR merges it cuts the GitHub release and
# vX.Y.Z tag, then the publish job re-validates the released commit (the
# committed dist/ must reproduce from src/) and moves the floating major tag
# (v1, v2, ...) consumers reference. release-please auto-detects this repo's
# release-please-config.json + .release-please-manifest.json.
name: Release

on:
  push:
    branches: [main]

# granted per job
permissions: {}

jobs:
  release:
    permissions:
      # create the github release + tag, and move the floating major tag
      contents: write
      # release-please creates pr labels through the issues api
      issues: write
      # release-please opens the release pull request
      pull-requests: write
    uses: bitwise-media-group/github-workflows/.github/workflows/release-actions.yaml@077a003a620f49bd0062c73fc761dbea05d7fb70 # v1.1.0
