# Thin caller: the core CI (lint, typecheck, unit tests + coverage, a fresh
# build, the dist-reproducibility gate, and the Codecov upload) lives in the
# shared reusable workflow. The integration and e2e matrix jobs are
# product-specific — they run the action for real against evolve's releases —
# so they stay here alongside the reusable `ci` job.
name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main", "releases/*"]

# granted per job
permissions: {}

jobs:
  ci:
    permissions:
      # ceiling for the reusable workflow's check + coverage jobs
      contents: read
    uses: bitwise-media-group/github-workflows/.github/workflows/ci-actions.yaml@077a003a620f49bd0062c73fc761dbea05d7fb70 # v1.1.0

  integration:
    runs-on: ubuntu-latest
    permissions:
      # checkout the repository
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: Real sigstore verification against live release assets
        run: npx vitest run __tests__/integration
        env:
          RUN_INTEGRATION: "1"

  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        version: [latest, 0.3.0, "~>0", ">=0.1, <1"]
        include:
          - os: ubuntu-latest
            version: latest
            pre-release: true
    runs-on: ${{ matrix.os }}
    permissions:
      # checkout the repository
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install evolve
        id: setup
        uses: ./
        with:
          version: ${{ matrix.version }}
          pre-release: ${{ matrix.pre-release || 'false' }}
          cache: false # exercised separately in e2e-cache

      - name: Assert outputs and binary works
        shell: bash
        env:
          RESOLVED: ${{ steps.setup.outputs.version }}
          INSTALL_PATH: ${{ steps.setup.outputs.path }}
        run: |
          set -eux
          test -n "$RESOLVED"
          test -n "$INSTALL_PATH"
          command -v evolve
          # Release builds print "evolve 0.1.0 (commit ..., built ...)".
          evolve version
          evolve version | grep -F "$RESOLVED"

      - name: Second install hits the runner tool cache
        id: again
        uses: ./
        with:
          version: ${{ matrix.version }}
          pre-release: ${{ matrix.pre-release || 'false' }}
          cache: false

      - name: Assert tool-cache hit
        shell: bash
        env:
          CACHE_HIT: ${{ steps.again.outputs.cache-hit }}
        run: test "$CACHE_HIT" = "tool-cache"

  # Exercises the @actions/cache path: the seed job saves, the restore job
  # starts on a fresh runner whose tool cache is empty, restores from the
  # Actions cache, and must re-verify the cached binary.
  e2e-cache-seed:
    runs-on: ubuntu-latest
    permissions:
      # checkout the repository
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./
        with:
          version: 0.3.0

  e2e-cache-restore:
    needs: e2e-cache-seed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: setup
        uses: ./
        with:
          version: 0.3.0
      - name: Assert Actions-cache hit (re-verified)
        shell: bash
        env:
          CACHE_HIT: ${{ steps.setup.outputs.cache-hit }}
        run: |
          set -eux
          test "$CACHE_HIT" = "cache"
          evolve version
