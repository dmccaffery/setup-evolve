# Lint, typecheck, unit tests, a dist-reproducibility gate (the committed
# dist/ must match a fresh build of src/), real-crypto integration tests, and
# an e2e matrix that runs the action for real against evolve's releases.
name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main", "releases/*"]

# granted per job
permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      # check out the repository
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      # The bundle consumers run is the one in git: a dist/ that does not
      # reproduce from src/ is either a stale build or a tampered artifact.
      - name: Verify dist/ is up to date
        run: git diff --exit-code -- dist
      # Hand the Cobertura report to the coverage job, which holds the
      # code-quality:write token. Forked PRs can't upload, so skip there.
      - name: Upload coverage artifact
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/cobertura-coverage.xml
          if-no-files-found: error

  # Publishes the Cobertura report to GitHub's code-quality dashboard. Split out
  # from `check` so the code-quality:write token is never present in the job
  # that runs PR-supplied code (npm install scripts, test code).
  coverage:
    needs: check
    if:
      ${{ !cancelled() && needs.check.result == 'success' && (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      # download artifacts
      contents: read
      # publish code quality results
      code-quality: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
      - uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1
        with:
          file: cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/vitest

  integration:
    runs-on: ubuntu-latest
    permissions:
      # checkout the repository
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: Real sigstore verification against live release assets
        run: npx vitest run __tests__/integration
        env:
          RUN_INTEGRATION: "1"

  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        version: [latest, 0.1.0, "~>0", ">=0.1, <1"]
        include:
          - os: ubuntu-latest
            version: latest
            pre-release: true
    runs-on: ${{ matrix.os }}
    permissions:
      # checkout the repository
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install evolve
        id: setup
        uses: ./
        with:
          version: ${{ matrix.version }}
          pre-release: ${{ matrix.pre-release || 'false' }}
          cache: false # exercised separately in e2e-cache

      - name: Assert outputs and binary works
        shell: bash
        env:
          RESOLVED: ${{ steps.setup.outputs.version }}
          INSTALL_PATH: ${{ steps.setup.outputs.path }}
        run: |
          set -eux
          test -n "$RESOLVED"
          test -n "$INSTALL_PATH"
          command -v evolve
          # Release builds print "evolve 0.1.0 (commit ..., built ...)".
          evolve version
          evolve version | grep -F "$RESOLVED"

      - name: Second install hits the runner tool cache
        id: again
        uses: ./
        with:
          version: ${{ matrix.version }}
          pre-release: ${{ matrix.pre-release || 'false' }}
          cache: false

      - name: Assert tool-cache hit
        shell: bash
        env:
          CACHE_HIT: ${{ steps.again.outputs.cache-hit }}
        run: test "$CACHE_HIT" = "tool-cache"

  # Exercises the @actions/cache path: the seed job saves, the restore job
  # starts on a fresh runner whose tool cache is empty, restores from the
  # Actions cache, and must re-verify the cached binary.
  e2e-cache-seed:
    runs-on: ubuntu-latest
    permissions:
      # checkout the repository
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./
        with:
          version: 0.1.0

  e2e-cache-restore:
    needs: e2e-cache-seed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: setup
        uses: ./
        with:
          version: 0.1.0
      - name: Assert Actions-cache hit (re-verified)
        shell: bash
        env:
          CACHE_HIT: ${{ steps.setup.outputs.cache-hit }}
        run: |
          set -eux
          test "$CACHE_HIT" = "cache"
          evolve version
